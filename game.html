<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Memory Matching - Game</title>
  </head>

  <body>
    <header>
      <h1>Memory Matching</h1>
    </header>

    <div class="container">
      <div class="boardHeader">
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Retries</div>
            <div class="stat-value" id="retries">0</div>
          </div>

          <div class="stat">
            <div class="stat-label">Miss</div>
            <div class="stat-value" id="misses">0</div>
          </div>

          <div class="stat">
            <div class="stat-label">Time</div>
            <div class="stat-value" id="time">0:00</div>
          </div>

          <div class="stat">
            <div class="stat-label">Matches</div>
            <div class="stat-value" id="matches">0/6</div>
          </div>
        </div>
      </div>

      <div class="game-board" id="gameBoard"></div>

      <div class="controls">
        <button class="btn" onclick="restartGame()">Restart Game</button>
      </div>
    </div>

    <div class="dialog hidden" id="winModal">
      <div class="dialog-content win">
        <p id="winMessage">Congratulations!</p>

        <div class="dialog-stats" id="winStats"></div>

        <div class="dialog-buttons">
          <button onclick="restartGame()">Play Again</button>
          <button onclick="resetGame()">Reset</button>
        </div>
      </div>
    </div>

    <div class="dialog hidden" id="loseModal">
      <div class="dialog-content lose">
        <p>You lost the game.</p>

        <div class="dialog-stats" id="loseStats"></div>

        <div class="dialog-buttons">
          <button onclick="restartGame()">Play Again</button>
          <button onclick="resetGame()">Reset</button>
        </div>
      </div>
    </div>

    <script src="game.js"></script>
  </body>
</html>
